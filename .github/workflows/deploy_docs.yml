name: Documentation

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          pip install -r docs/requirements.txt
          pip install -e .

      - name: Register Jupyter kernel
        run: |
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build Sphinx documentation
        run: |
          cd docs
          make clean
          make html

      - name: Verify build output
        run: |
          ls -lah docs/build/html
          test -f docs/build/html/index.html

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/build/html
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: docs/build/html

      - name: Verify downloaded files
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Downloaded files:"
          find docs/build/html | sort

          echo ""
          echo "Checking for index.html"
          test -f docs/build/html/index.html

      - name: Deploy to stephenmwilkins.github.io/synthpop
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: stephenmwilkins/stephenmwilkins.github.io
          publish_dir: docs/build/html
          destination_dir: synthpop
          publish_branch: master
          keep_files: false